name: Daily AI Knowledge Collection

# 每天 UTC 08:00（北京时间 16:00）自动采集
on:
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch:  # 支持手动触发

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Show workflow revision
        run: |
          echo "github.ref=${GITHUB_REF}"
          echo "github.sha=${GITHUB_SHA}"
          echo "checked_out_sha=$(git rev-parse HEAD)"
          grep -n 'articles_dir = Path' workflows/organizer.py

      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
          cache-dependency-glob: "pyproject.toml"

      - name: Install dependencies
        run: uv sync

      - name: Run LangGraph workflow
        env:
          LLM_PROVIDER: ${{ secrets.LLM_PROVIDER }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DASHSCOPE_API_KEY: ${{ secrets.DASHSCOPE_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          uv run python -m workflows.graph \
            --sources github,rss \
            --limit 20 \
            --verbose

      - name: Validate collected articles
        run: |
          article_files="$(find knowledge/articles -maxdepth 1 -type f -name '*.json' ! -name 'index.json' | sort)"
          if [ -n "$article_files" ]; then
            uv run python hooks/validate_json.py $article_files
            uv run python hooks/check_quality.py $article_files
          else
            echo "No articles to validate"
          fi

      - name: Commit and push results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add knowledge/articles knowledge/raw
          if git diff --staged --quiet; then
            echo "No new articles to commit"
          else
            ARTICLE_COUNT=$(git diff --staged --name-only | grep -c '\.json$' || true)
            git commit -m "chore: daily collection - ${ARTICLE_COUNT} articles [$(date -u +%Y-%m-%d)]"
            git push
          fi
